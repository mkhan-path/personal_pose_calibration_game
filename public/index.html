<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Board Calibration Pose Labeling</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* --- Banner --- */
    .banner {
      width: 100%;
      padding: 12px 16px;
      background: #0f3460;
      text-align: center;
      border-bottom: 1px solid #1a4a8a;
    }
    .banner-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .banner-subtitle {
      font-size: 0.8rem;
      color: #aac4e0;
      line-height: 1.4;
    }
    .banner a {
      color: #64b5f6;
      text-decoration: none;
      font-weight: 600;
    }
    .banner a:hover { text-decoration: underline; }

    /* --- Header bar --- */
    header {
      width: 100%;
      padding: 10px 16px;
      background: #16213e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #0f3460;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header-left span { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
    #syncBtn {
      padding: 10px 16px;
      min-height: 44px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      background: #0f3460;
      color: #e0e0e0;
      white-space: nowrap;
    }
    #syncBtn:hover:not(:disabled) { background: #1a4a8a; }
    #syncBtn:disabled { opacity: 0.4; cursor: default; }

    /* --- Progress --- */
    .progress-section {
      width: 100%;
      padding: 10px 16px 0;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #0f3460);
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    /* --- Stats --- */
    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 0.8rem;
      color: #888;
      padding: 6px 16px;
    }

    /* --- Main content area --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* --- Images --- */
    .images-container {
      display: flex;
      gap: 8px;
      padding: 4px 16px;
      width: 100%;
      flex: 1;
      min-height: 0;
    }
    .image-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #16213e;
      border-radius: 8px;
      padding: 8px;
      border: 2px solid #0f3460;
      min-width: 0;
      overflow: hidden;
    }
    .image-panel h2 {
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #e94560;
    }
    .image-panel img {
      width: 100%;
      max-height: 45vh;
      object-fit: contain;
      border-radius: 6px;
      background: #0a0a1a;
    }

    /* --- Pair info --- */
    .pair-info {
      text-align: center;
      padding: 4px 16px;
      font-size: 0.75rem;
      color: #666;
      word-break: break-all;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* --- Controls --- */
    .controls {
      padding: 8px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .label-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .label-btn {
      flex: 1;
      min-height: 52px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .label-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }
    .label-btn:active { transform: translateY(0); }
    .btn-pass  { background: #2ecc71; }
    .btn-fail  { background: #e74c3c; }
    .btn-unsure { background: #f39c12; }
    .label-btn .shortcut {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 1px;
    }

    .nav-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .nav-btn {
      min-width: 52px;
      min-height: 48px;
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:hover:not(:disabled) { background: #3a3a5a; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    .current-label {
      flex: 1;
      text-align: center;
      padding: 6px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .current-label.pass  { background: #2ecc71; color: #fff; }
    .current-label.fail  { background: #e74c3c; color: #fff; }
    .current-label.unsure { background: #f39c12; color: #fff; }
    .current-label.none  { background: #444; color: #aaa; }

    /* --- Done screen --- */
    .done-screen {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }
    .done-screen h2 { font-size: 1.6rem; color: #2ecc71; margin-bottom: 12px; }
    .done-screen p { color: #aaa; font-size: 0.9rem; }

    /* --- Desktop (>= 600px) --- */
    @media (min-width: 600px) {
      .banner { padding: 14px 24px; }
      .banner-title { font-size: 1.25rem; }
      .banner-subtitle { font-size: 0.85rem; }
      header { padding: 12px 24px; }
      .progress-section { padding: 14px 24px 0; }
      .stats { font-size: 0.85rem; padding: 8px 24px; }
      .images-container { gap: 16px; padding: 6px 24px; }
      .image-panel { padding: 12px; border-radius: 12px; }
      .image-panel h2 { font-size: 1rem; margin-bottom: 8px; }
      .image-panel img { max-height: 55vh; }
      .pair-info { font-size: 0.8rem; padding: 8px 24px; white-space: normal; }
      .controls { padding: 12px 24px 20px; gap: 10px; }
      .label-btn { min-height: 56px; font-size: 1.15rem; }
      .nav-btn { min-width: 60px; min-height: 52px; font-size: 1.4rem; }
      .done-screen { padding: 60px; }
      .done-screen h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="banner">
    <div class="banner-title">Board Calibration Pose Labeling</div>
    <div class="banner-subtitle">
      This tool is for <strong>calibration_board_home_pose</strong> only &mdash;
      used for local scanner calibration.
      <a href="https://pathrobotics.atlassian.net/wiki/spaces/CBU/pages/3279814738/Pose+Requirements#calibration_board_home_pose" target="_blank" rel="noopener">What is this?</a>
    </div>
  </div>

  <header>
    <div class="header-left">
      <span id="labeledCount"></span>
    </div>
    <button id="syncBtn" onclick="syncToSheets()">Sync to Sheets</button>
  </header>

  <div class="progress-section">
    <div class="progress-info">
      <span id="pairCounter">0 / 0</span>
      <span id="datasetInfo"></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="main-content">
    <div class="images-container" id="imagesContainer">
      <div class="image-panel">
        <h2>Left</h2>
        <img id="leftImg" alt="Left camera image">
      </div>
      <div class="image-panel">
        <h2>Right</h2>
        <img id="rightImg" alt="Right camera image">
      </div>
    </div>

    <div class="pair-info" id="pairInfo"></div>
  </div>

  <div class="controls">
    <div class="label-row">
      <button class="label-btn btn-pass" onclick="submitLabel('pass')">
        Pass<span class="shortcut">[P]</span>
      </button>
      <button class="label-btn btn-fail" onclick="submitLabel('fail')">
        Fail<span class="shortcut">[F]</span>
      </button>
      <button class="label-btn btn-unsure" onclick="submitLabel('unsure')">
        Unsure<span class="shortcut">[U]</span>
      </button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="goBack()" disabled>&lsaquo;</button>
      <span class="current-label none" id="currentLabel">No label</span>
      <button class="nav-btn" id="nextBtn" onclick="goNext()">&rsaquo;</button>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <h2 id="doneTitle">Submitting...</h2>
    <p id="doneMessage">Sending labels to Google Sheets.</p>
  </div>

<script>
  const STORAGE_KEY = 'pose_calibration_labels';
  let pairs = [];
  let labels = {};
  let currentIndex = 0;

  function loadLabels() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : {};
    } catch { return {}; }
  }

  function saveLabels() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(labels));
  }

  async function init() {
    const res = await fetch('/api/pairs');
    const data = await res.json();
    pairs = data.pairs;
    labels = loadLabels();

    const firstUnlabeled = pairs.findIndex(p => !labels[pairKey(p)]);
    currentIndex = firstUnlabeled === -1 ? pairs.length - 1 : firstUnlabeled;

    render();
  }

  function pairKey(pair) {
    return `${pair.dataset}/${pair.split}/${pair.filename}`;
  }

  function render() {
    if (pairs.length === 0) {
      document.getElementById('pairInfo').textContent = 'No image pairs found.';
      return;
    }

    const labeledCount = Object.keys(labels).length;
    const total = pairs.length;

    document.getElementById('pairCounter').textContent = `${currentIndex + 1} / ${total}`;
    document.getElementById('progressBar').style.width = `${(labeledCount / total) * 100}%`;
    document.getElementById('labeledCount').textContent = `${labeledCount} labeled`;

    const counts = { pass: 0, fail: 0, unsure: 0 };
    for (const l of Object.values(labels)) counts[l.label] = (counts[l.label] || 0) + 1;
    document.getElementById('stats').textContent =
      `Pass: ${counts.pass}  |  Fail: ${counts.fail}  |  Unsure: ${counts.unsure}`;

    const allDone = labeledCount === total;
    document.getElementById('doneScreen').style.display =
      (allDone && currentIndex >= total - 1) ? 'block' : 'none';

    const pair = pairs[currentIndex];
    if (!pair) return;

    document.getElementById('leftImg').src = pair.left_url;
    document.getElementById('rightImg').src = pair.right_url;
    document.getElementById('datasetInfo').textContent = `${pair.dataset} / ${pair.split}`;
    document.getElementById('pairInfo').textContent = pair.filename;

    const key = pairKey(pair);
    const existing = labels[key];
    const labelEl = document.getElementById('currentLabel');
    if (existing) {
      labelEl.textContent = existing.label.toUpperCase();
      labelEl.className = `current-label ${existing.label}`;
    } else {
      labelEl.textContent = 'No label';
      labelEl.className = 'current-label none';
    }

    document.getElementById('prevBtn').disabled = currentIndex === 0;
  }

  function submitLabel(label) {
    if (pairs.length === 0) return;
    const pair = pairs[currentIndex];
    const key = pairKey(pair);

    labels[key] = {
      filename: pair.filename,
      dataset: pair.dataset,
      split: pair.split,
      label,
      timestamp: new Date().toISOString()
    };
    saveLabels();
    render();

    if (currentIndex < pairs.length - 1) {
      currentIndex++;
      render();
    } else if (Object.keys(labels).length === pairs.length) {
      autoSyncOnComplete();
    }
  }

  async function autoSyncOnComplete() {
    const titleEl = document.getElementById('doneTitle');
    const msgEl = document.getElementById('doneMessage');
    titleEl.textContent = 'Submitting...';
    titleEl.style.color = '#f39c12';
    msgEl.textContent = 'Sending labels to Google Sheets.';

    try {
      const res = await fetch('/api/sync-sheets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ labels })
      });
      const data = await res.json();
      if (data.ok) {
        titleEl.textContent = 'Submitted! Thank you.';
        titleEl.style.color = '#2ecc71';
        msgEl.textContent = `${data.rowsAppended} rows synced to Google Sheets.`;
      } else {
        titleEl.textContent = 'Sync failed';
        titleEl.style.color = '#e74c3c';
        msgEl.textContent = data.error;
      }
    } catch (err) {
      titleEl.textContent = 'Sync failed';
      titleEl.style.color = '#e74c3c';
      msgEl.textContent = err.message;
    }
  }

  async function syncToSheets() {
    const btn = document.getElementById('syncBtn');
    if (Object.keys(labels).length === 0) return;

    btn.disabled = true;
    btn.textContent = 'Syncing...';

    try {
      const res = await fetch('/api/sync-sheets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ labels })
      });
      const data = await res.json();
      btn.textContent = data.ok ? 'Synced!' : 'Sync failed';
    } catch {
      btn.textContent = 'Sync failed';
    }

    setTimeout(() => {
      btn.textContent = 'Sync to Sheets';
      btn.disabled = false;
    }, 5000);
  }

  function goBack() {
    if (currentIndex > 0) {
      currentIndex--;
      render();
    }
  }

  function goNext() {
    if (currentIndex < pairs.length - 1) {
      currentIndex++;
      render();
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key.toLowerCase()) {
      case 'p': submitLabel('pass'); break;
      case 'f': submitLabel('fail'); break;
      case 'u': submitLabel('unsure'); break;
      case 'arrowleft': goBack(); break;
      case 'arrowright': goNext(); break;
    }
  });

  init();
</script>
</body>
</html>
